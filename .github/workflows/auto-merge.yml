# Auto-merge: every non-draft PR is queued for squash-merge as soon as
# the required status checks (build-linux/macos/windows) turn green.
#
# Without this workflow, each PR would need a manual "Enable auto-merge"
# click in the UI (or `gh pr merge --auto`). With it, the only manual
# step is opening the PR — main's branch protection still blocks the
# actual merge until the three required builds pass, so this is purely
# automation, not a relaxation of the gating.
#
# Why a PAT (AUTOMERGE_PAT) instead of the default GITHUB_TOKEN: when a
# workflow uses GITHUB_TOKEN to merge a PR, the resulting push to main
# is attributed to the token and GitHub deliberately suppresses any
# downstream workflow_run / push events. That meant build.yml's
# main-push job stopped firing on every merge — branch builds still
# ran, tag-triggered release builds still ran, but the post-merge
# validation against main's HEAD was silently skipped. A user-scoped
# fine-grained PAT scoped to this repo (Contents + Pull requests:
# read+write) doesn't trip the recursion guard, so the merge it
# performs DOES trigger build.yml on main as expected.

name: Auto-merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    # Skip drafts (still WIP) AND skip PRs from forks. GitHub strips
    # secrets — including AUTOMERGE_PAT — from any workflow triggered
    # by a fork's pull_request, so this job would fail with "no token
    # provided" and litter the Actions log. Fork PRs are reviewed
    # manually by the maintainer; once approved, branch protection
    # auto-fires the merge anyway.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash
