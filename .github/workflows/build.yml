name: Linux & macOS Build (LLVM)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake llvm-18-dev
      
      - name: Build with LLVM
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j$(nproc)
        timeout-minutes: 10
      
      - name: Run tests
        run: |
          cp build/tulpar tulpar
          chmod +x tulpar
          chmod +x build.sh
          ./build.sh test
        timeout-minutes: 5
        continue-on-error: true
      
      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp build/tulpar dist/tulpar-linux-x64
          cp build/libtulpar_runtime.a dist/libtulpar_runtime-linux-x64.a
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tulpar-linux-x64
          path: dist/tulpar-linux-x64
  
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew list --versions cmake >/dev/null 2>&1 || brew install cmake
          brew list --versions llvm@18 >/dev/null 2>&1 || brew install llvm@18
          echo 'export PATH="/opt/homebrew/opt/llvm@18/bin:$PATH"' >> ~/.zshrc
          export PATH="/opt/homebrew/opt/llvm@18/bin:$PATH"
      
      - name: Build with LLVM
        run: |
          export PATH="/opt/homebrew/opt/llvm@18/bin:$PATH"
          export LLVM_DIR="/opt/homebrew/opt/llvm@18/lib/cmake/llvm"
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR=$LLVM_DIR
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
        timeout-minutes: 10
      
      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp build/tulpar dist/tulpar-macos-universal
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tulpar-macos-universal
          path: dist/tulpar-macos-universal
  
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup LLVM
        shell: pwsh
        run: |
          Write-Host "Setting up LLVM for Windows build..." -ForegroundColor Cyan
          
          # First, uninstall existing LLVM if present
          Write-Host "Removing existing LLVM installation..." -ForegroundColor Yellow
          choco uninstall llvm -y --force 2>$null
          Start-Sleep -Seconds 3
          
          # Install specific LLVM version with dev files
          Write-Host "Installing LLVM 18.1.8 via Chocolatey..." -ForegroundColor Cyan
          choco install llvm --version=18.1.8 -y --force
          
          # Refresh environment variables
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          
          # Wait for installation to complete
          Start-Sleep -Seconds 5
          
          # Verify installation
          $llvmPath = "C:\Program Files\LLVM"
          if (Test-Path $llvmPath) {
            Write-Host "LLVM installed at: $llvmPath" -ForegroundColor Green
            Write-Host "LLVM version:" -ForegroundColor Cyan
            & "$llvmPath\bin\llvm-config.exe" --version
          } else {
            Write-Host "ERROR: LLVM directory not found!" -ForegroundColor Red
            exit 1
          }
          
          # Search for LLVMConfig.cmake in all possible locations
          Write-Host "Searching for LLVM CMake files..." -ForegroundColor Cyan
          $cmakeFiles = Get-ChildItem "$llvmPath" -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue
          
          if ($cmakeFiles) {
            $cmakePath = $cmakeFiles[0].DirectoryName
            Write-Host "✓ Found LLVMConfig.cmake at: $cmakePath" -ForegroundColor Green
            echo "LLVM_CMAKE_DIR=$cmakePath" >> $env:GITHUB_ENV
          } else {
            Write-Host "ERROR: LLVMConfig.cmake not found in LLVM installation!" -ForegroundColor Red
            Write-Host "Searching all cmake directories..." -ForegroundColor Yellow
            Get-ChildItem "$llvmPath" -Recurse -Directory -Filter "cmake" | ForEach-Object { 
              Write-Host "  Found cmake dir: $($_.FullName)"
              Get-ChildItem $_.FullName -Filter "*.cmake" | ForEach-Object { Write-Host "    - $($_.Name)" }
            }
            exit 1
          }
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Build with LLVM
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files\LLVM\bin;$env:PATH"
          
          Write-Host "LLVM_CMAKE_DIR: $env:LLVM_CMAKE_DIR" -ForegroundColor Cyan
          
          Write-Host "Configuring CMake with MSVC..." -ForegroundColor Cyan
          mkdir build-windows
          cd build-windows
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$env:LLVM_CMAKE_DIR"
          
          Write-Host "Building with MSVC..." -ForegroundColor Cyan
          cmake --build . --config Release -j
        timeout-minutes: 25
      
      - name: Prepare artifact
        shell: pwsh
        run: |
          mkdir dist
          copy build-windows\Release\tulpar.exe dist\tulpar-windows-x64.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tulpar-windows-x64
          path: dist/tulpar-windows-x64.exe
  
  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    continue-on-error: true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tulpar-*
          merge-multiple: true
      
      - name: Compute release tag
        id: ver
        shell: bash
        run: |
          TAG="v2.1.0.${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: TulparLang ${{ steps.ver.outputs.tag }} (LLVM)
          body: |
            ## TulparLang ${{ steps.ver.outputs.tag }}
            
            **LLVM-Based AOT Compiler**
            
            ### Features
            - Native compilation via LLVM backend
            - For loops, try/catch, file I/O, modules
            - Cross-platform support
            
            ### Downloads
            - `tulpar-linux-x64` - Linux executable
            - `tulpar-macos-universal` - macOS executable
            - `tulpar-windows-x64.exe` - Windows executable (native MSVC build)
            
            > **Note**: Windows now has native support! No WSL required.
          draft: false
          prerelease: false
          files: |
            tulpar-linux-x64
            tulpar-macos-universal
            tulpar-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
