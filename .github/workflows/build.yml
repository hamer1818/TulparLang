name: Linux & macOS Build (LLVM)

on:
  push:
    branches: [ main, master, develop ]
    # Tag pushes (e.g. `git tag v1.0.0 && git push origin v1.0.0`) also
    # trigger this workflow so we can mint stable / explicitly-versioned
    # releases without hand-running anything else. The create-release
    # job below detects whether we're on a tag and uses the tag name
    # verbatim as the version (vs. the rolling `v2.1.0.<run>` we
    # auto-mint on main pushes).
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  # `actions: read` is needed by the reuse-PR-artifacts step on push:main
  # so it can list and download artifacts from the PR's earlier build run.
  actions: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      # Skip the vendored Emscripten SDK at clone time — it's ~400 MB
      # and the main CMake build doesn't reference it (wasm builds run
      # locally via wasm/build_wasm.sh, never in CI). Saves ~20-40s of
      # checkout time on every job. cone-mode must be off because we
      # want to *exclude* a path while keeping everything else.
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            /*
            !wasm/emsdk
          sparse-checkout-cone-mode: false

      # On push:main we usually arrive at a squash-merge of a PR whose
      # build already ran green. Re-running the same build wastes 5-10
      # min of runner wall time and a few cents of compute. Try to
      # reuse the PR's published artifacts instead; if anything about
      # the lookup fails we fall through to a fresh build (no behavior
      # change in the worst case). pull_request and tag pushes always
      # build from source — they don't have a prior PR to reuse.
      - name: Try to reuse PR's build artifacts
        id: reuse
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Default squash subject is "Title (#NN)" — extract NN. If
          # the commit isn't from a squash merge (e.g. direct push, or
          # merge-commit instead of squash), the subject lacks the ref
          # and we fall back to building.
          pr_num=$(git log -1 --format='%s' | grep -oE '\(#[0-9]+\)' | tr -d '(#)' || true)
          if [ -z "$pr_num" ]; then
            echo "No PR reference in commit subject — building from scratch."
            echo "reused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          head_sha=$(gh pr view "$pr_num" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
          if [ -z "$head_sha" ]; then
            echo "PR #$pr_num not accessible — building from scratch."
            echo "reused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Find a successful build on the PR's head commit. Limit 30
          # so a long-running PR with many force-pushes still finds
          # the right run. Returns the most recent if multiple.
          run_id=$(gh run list --workflow='Linux & macOS Build (LLVM)' \
                     --status=success --limit=30 \
                     --json databaseId,headSha \
                     --jq ".[] | select(.headSha==\"$head_sha\") | .databaseId" \
                     | head -1)
          if [ -z "$run_id" ]; then
            echo "No successful build run for PR #$pr_num head $head_sha — building from scratch."
            echo "reused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Reusing artifacts from PR #$pr_num build run $run_id"
          # Stage the artifacts at the canonical paths the existing
          # Upload steps already point at, so reuse and built paths
          # produce structurally identical artifacts.
          #
          # Drop `set -e` around the restore so a transient download/cp
          # failure falls back to a fresh build instead of failing the
          # whole job. The job-level promise is "reuse if cheap, else
          # rebuild" — a flaky artifact API shouldn't take main red.
          set +e
          mkdir -p dist _pr-artifacts
          gh run download "$run_id" -n tulpar-linux-x64           -D _pr-artifacts
          dl_a=$?
          gh run download "$run_id" -n libtulpar_runtime-linux-x64 -D _pr-artifacts
          dl_b=$?
          if [ $dl_a -ne 0 ] || [ $dl_b -ne 0 ]; then
            echo "Artifact download failed (codes $dl_a,$dl_b) — falling back to fresh build."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          cp _pr-artifacts/tulpar-linux-x64           dist/tulpar-linux-x64 2>/dev/null || \
            cp _pr-artifacts/tulpar-linux-x64/tulpar-linux-x64 dist/tulpar-linux-x64
          cp _pr-artifacts/libtulpar_runtime-linux-x64.a dist/libtulpar_runtime-linux-x64.a 2>/dev/null || \
            cp _pr-artifacts/libtulpar_runtime-linux-x64/libtulpar_runtime-linux-x64.a dist/libtulpar_runtime-linux-x64.a
          if [ ! -f dist/tulpar-linux-x64 ] || [ ! -f dist/libtulpar_runtime-linux-x64.a ]; then
            echo "Artifact staging failed (file missing after copy) — falling back to fresh build."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          chmod +x dist/tulpar-linux-x64
          ls -la dist/
          echo "reused=true" >> "$GITHUB_OUTPUT"

      # ccache stores compiler outputs keyed on preprocessed source +
      # flags. First run on a fresh branch is a cold miss (no speedup);
      # subsequent runs hit on every untouched .cpp and only recompile
      # what actually changed. The action handles cache key / restore
      # / save and exposes `ccache gcc` / `ccache g++` via PATH wrappers.
      - name: Setup ccache
        if: steps.reuse.outputs.reused != 'true'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ runner.os }}-ccache
          max-size: 500M

      - name: Install dependencies
        if: steps.reuse.outputs.reused != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake llvm-18-dev

      - name: Build with LLVM
        if: steps.reuse.outputs.reused != 'true'
        env:
          # Mirrors the formula used by `create-release` below so the
          # embedded version (`tulpar --version`) matches the published
          # release tag — which is what `tulpar update --check` compares
          # against.
          # Tag-pushed builds embed the tag name (so `tulpar --version`
          # shows e.g. `v1.0.0`); main-pushed builds get the rolling
          # auto-version. Same expression used by the create-release job
          # to keep `tulpar update --check` consistent with the embedded
          # version string.
          TULPAR_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.1.0.{0}', github.run_number) }}
        run: |
          mkdir -p build
          cd build
          # CMAKE_<LANG>_COMPILER_LAUNCHER routes every cc/c++ invocation
          # through ccache without us having to fiddle with CC/CXX (and
          # without confusing autodetection that sniffs the compiler
          # binary's name).
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DTULPAR_VERSION="${TULPAR_VERSION}"
          cmake --build . --config Release -j$(nproc)
        timeout-minutes: 10

      # Test failures used to be masked with `continue-on-error: true`,
      # which hid a months-long Linux regression where every example
      # failed AOT linking against `libtulpar_runtime.a` (missing
      # OpenSSL link flags). Mask removed so test breakage actually
      # turns the job red and blocks the release.
      # All test+prep steps below are gated on `reused != 'true'` —
      # the PR's build already ran them and turned green, so a
      # successful reuse means we trust those results. (Tag pushes and
      # PRs always run them; only post-merge main-push uses the reuse
      # path.)
      - name: Run tests
        if: steps.reuse.outputs.reused != 'true'
        run: |
          cp build/tulpar tulpar
          chmod +x tulpar
          chmod +x build.sh
          ./build.sh test
        timeout-minutes: 5

      # typeinfer regression suite — drives `tulpar --strict <file>` over
      # tests/typeinfer/{pass,fail}/*.tpr. The runner already builds the
      # binary above; we just need to make the script executable.
      - name: Run typeinfer strict-mode tests
        if: steps.reuse.outputs.reused != 'true'
        run: |
          chmod +x tests/typeinfer/run.sh
          ./tests/typeinfer/run.sh
        timeout-minutes: 2

      # SHA-256 smoke test for the package-manager checksum helper.
      # Compiles the helper standalone against FIPS 180-4 reference
      # vectors. Cheap (~1s) and orthogonal to the main `tulpar` binary
      # so a regression in this isolated unit fails fast.
      - name: SHA-256 helper test
        if: steps.reuse.outputs.reused != 'true'
        run: |
          g++ -std=c++17 tests/sha256_smoke.cpp src/pkg/sha256.cpp \
              -Isrc/pkg -o sha256_smoke
          ./sha256_smoke

      - name: Prepare artifact
        if: steps.reuse.outputs.reused != 'true'
        run: |
          mkdir -p dist
          cp build/tulpar dist/tulpar-linux-x64
          cp build/libtulpar_runtime.a dist/libtulpar_runtime-linux-x64.a

      # Upload runs unconditionally — `dist/tulpar-linux-x64` was
      # placed there either by the reuse step (downloaded from PR run)
      # or by Prepare artifact (copied from build/).
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tulpar-linux-x64
          path: dist/tulpar-linux-x64

      - name: Upload runtime library
        uses: actions/upload-artifact@v7
        with:
          name: libtulpar_runtime-linux-x64
          path: dist/libtulpar_runtime-linux-x64.a

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            /*
            !wasm/emsdk
          sparse-checkout-cone-mode: false

      # Same reuse-on-push:main pattern as build-linux. See the Linux
      # job's reuse step for the rationale and fallback behavior.
      - name: Try to reuse PR's build artifacts
        id: reuse
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          pr_num=$(git log -1 --format='%s' | grep -oE '\(#[0-9]+\)' | tr -d '(#)' || true)
          if [ -z "$pr_num" ]; then
            echo "No PR reference in commit subject — building from scratch."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          head_sha=$(gh pr view "$pr_num" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
          if [ -z "$head_sha" ]; then
            echo "PR #$pr_num not accessible — building from scratch."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          run_id=$(gh run list --workflow='Linux & macOS Build (LLVM)' \
                     --status=success --limit=30 \
                     --json databaseId,headSha \
                     --jq ".[] | select(.headSha==\"$head_sha\") | .databaseId" \
                     | head -1)
          if [ -z "$run_id" ]; then
            echo "No successful build run for PR #$pr_num head $head_sha — building from scratch."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Reusing artifacts from PR #$pr_num build run $run_id"
          # See build-linux for the rationale on dropping `set -e` here.
          set +e
          mkdir -p dist _pr-artifacts
          gh run download "$run_id" -n tulpar-macos-universal           -D _pr-artifacts
          dl_a=$?
          gh run download "$run_id" -n libtulpar_runtime-macos-universal -D _pr-artifacts
          dl_b=$?
          if [ $dl_a -ne 0 ] || [ $dl_b -ne 0 ]; then
            echo "Artifact download failed (codes $dl_a,$dl_b) — falling back to fresh build."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          cp _pr-artifacts/tulpar-macos-universal           dist/tulpar-macos-universal 2>/dev/null || \
            cp _pr-artifacts/tulpar-macos-universal/tulpar-macos-universal dist/tulpar-macos-universal
          cp _pr-artifacts/libtulpar_runtime-macos-universal.a dist/libtulpar_runtime-macos-universal.a 2>/dev/null || \
            cp _pr-artifacts/libtulpar_runtime-macos-universal/libtulpar_runtime-macos-universal.a dist/libtulpar_runtime-macos-universal.a
          if [ ! -f dist/tulpar-macos-universal ] || [ ! -f dist/libtulpar_runtime-macos-universal.a ]; then
            echo "Artifact staging failed (file missing after copy) — falling back to fresh build."
            echo "reused=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          chmod +x dist/tulpar-macos-universal
          ls -la dist/
          echo "reused=true" >> "$GITHUB_OUTPUT"

      - name: Setup ccache
        if: steps.reuse.outputs.reused != 'true'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ runner.os }}-ccache
          max-size: 500M

      - name: Install dependencies
        if: steps.reuse.outputs.reused != 'true'
        run: |
          brew list --versions cmake >/dev/null 2>&1 || brew install cmake
          brew list --versions llvm@18 >/dev/null 2>&1 || brew install llvm@18

      - name: Build with LLVM
        if: steps.reuse.outputs.reused != 'true'
        env:
          # Tag-pushed builds embed the tag name (so `tulpar --version`
          # shows e.g. `v1.0.0`); main-pushed builds get the rolling
          # auto-version. Same expression used by the create-release job
          # to keep `tulpar update --check` consistent with the embedded
          # version string.
          TULPAR_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.1.0.{0}', github.run_number) }}
        run: |
          # Use `brew --prefix` instead of hardcoding /opt/homebrew so
          # this still works if GitHub's macos-latest image switches
          # between ARM (/opt/homebrew) and Intel (/usr/local) or a
          # self-hosted runner uses a different layout.
          LLVM_PREFIX="$(brew --prefix llvm@18)"
          export PATH="$LLVM_PREFIX/bin:$PATH"
          export LLVM_DIR="$LLVM_PREFIX/lib/cmake/llvm"
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR=$LLVM_DIR \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DTULPAR_VERSION="${TULPAR_VERSION}"
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
        timeout-minutes: 10

      - name: Prepare artifact
        if: steps.reuse.outputs.reused != 'true'
        run: |
          mkdir -p dist
          cp build/tulpar dist/tulpar-macos-universal
          cp build/libtulpar_runtime.a dist/libtulpar_runtime-macos-universal.a

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tulpar-macos-universal
          path: dist/tulpar-macos-universal

      - name: Upload runtime library
        uses: actions/upload-artifact@v7
        with:
          name: libtulpar_runtime-macos-universal
          path: dist/libtulpar_runtime-macos-universal.a

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            /*
            !wasm/emsdk
          sparse-checkout-cone-mode: false

      # MSYS2 mingw64 is the only realistic way to get a full LLVM dev tree
      # (headers + LLVM*.dll.a libs) on a Windows runner without a 30+ min
      # vcpkg/source build. The official LLVM Windows installer and Chocolatey
      # only ship the compiler distribution — the static libs we link against
      # (LLVMCore, LLVMSupport, …) aren't there.
      #
      # `cache: true` snapshots the full MSYS2 install tree keyed on the
      # `install:` package list — turning a ~90s package-manager run into
      # a ~10s cache restore. Cache invalidates automatically when the
      # package list below changes. We dropped `mingw-w64-x86_64-clang`
      # because the build uses gcc/g++ (see CMAKE_C_COMPILER below); the
      # only consumer was a `clang --version` diagnostic line we no
      # longer need.
      # Same reuse-on-push:main pattern as the Linux/macOS jobs. The
      # Windows job pulls four artifacts (binary, runtime lib, the
      # bundled MinGW DLL set, and the Inno Setup installer) instead
      # of two — the rest of the logic is identical. Run via pwsh
      # because gh CLI is on the Windows-native PATH and we need
      # consistent behavior across MSYS2 / pwsh shells.
      - name: Try to reuse PR's build artifacts
        id: reuse
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          # `git log -1 --format=%s` needs a real subject; default
          # squash format is "Title (#NN)". If no PR ref present we
          # fall through to a fresh build.
          $subject = (git log -1 --format='%s').Trim()
          $m = [regex]::Match($subject, '\(#([0-9]+)\)')
          if (-not $m.Success) {
            Write-Host "No PR reference in commit subject — building from scratch."
            "reused=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $prNum = $m.Groups[1].Value
          $headSha = (gh pr view $prNum --json headRefOid --jq '.headRefOid' 2>$null)
          if (-not $headSha) {
            Write-Host "PR #$prNum not accessible — building from scratch."
            "reused=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $runs = gh run list --workflow='Linux & macOS Build (LLVM)' `
                    --status=success --limit=30 `
                    --json databaseId,headSha | ConvertFrom-Json
          $runId = ($runs | Where-Object { $_.headSha -eq $headSha } |
                    Select-Object -First 1).databaseId
          if (-not $runId) {
            Write-Host "No successful build run for PR #$prNum head $headSha — building from scratch."
            "reused=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          Write-Host "Reusing artifacts from PR #$prNum build run $runId"
          # Wrap the artifact restore in try/catch so a transient download
          # failure (or a missing-file in a published artifact) falls back
          # to a fresh build instead of failing the whole job. See the
          # build-linux job for the bash equivalent and rationale.
          try {
            New-Item -ItemType Directory -Force -Path dist, _pr-artifacts | Out-Null
            $downloads = @(
              'tulpar-windows-x64',
              'libtulpar_runtime-windows-x64',
              'tulpar-windows-runtime-dlls',
              'tulpar-windows-installer'
            )
            foreach ($d in $downloads) {
              gh run download $runId -n $d -D _pr-artifacts
              if ($LASTEXITCODE -ne 0) { throw "gh run download failed for $d (exit $LASTEXITCODE)" }
            }
            # Flatten artifact subdirs into dist/ at the canonical paths
            # the existing Upload steps point at. Each artifact may land
            # either as a flat file (single-file artifact extracted
            # directly) or inside a name-prefixed subdirectory — try
            # both shapes.
            function Move-Stage($name, $target) {
              $a = Join-Path '_pr-artifacts' $target
              $b = Join-Path '_pr-artifacts' "$name/$target"
              if (Test-Path $a) { Copy-Item $a "dist/$target" -Force }
              elseif (Test-Path $b) { Copy-Item $b "dist/$target" -Force }
              else { throw "missing $name artifact: neither $a nor $b" }
            }
            Move-Stage 'tulpar-windows-x64' 'tulpar-windows-x64.exe'
            Move-Stage 'libtulpar_runtime-windows-x64' 'libtulpar_runtime-windows-x64.a'
            Move-Stage 'tulpar-windows-installer' 'tulpar-setup-windows-x64.exe'
            # The DLL bundle artifact contains 5 files; copy them all.
            $dllSrc = if (Test-Path '_pr-artifacts/tulpar-windows-runtime-dlls') {
                        '_pr-artifacts/tulpar-windows-runtime-dlls'
                      } else { '_pr-artifacts' }
            foreach ($dll in 'libwinpthread-1.dll','zlib1.dll','libzstd.dll','libssl-3-x64.dll','libcrypto-3-x64.dll') {
              $src = Join-Path $dllSrc $dll
              if (-not (Test-Path $src)) { throw "missing DLL in artifact: $dll" }
              Copy-Item $src "dist/$dll" -Force
            }
            Get-ChildItem dist | Format-Table Name, Length
            "reused=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } catch {
            Write-Host "Artifact reuse failed: $_ — falling back to fresh build." -ForegroundColor Yellow
            "reused=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

      - name: Setup MSYS2
        id: msys2
        if: steps.reuse.outputs.reused != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-openssl

      # ccache cache pinned to a workspace-relative path so both the
      # msys2 shell and Windows-native actions/cache see the same dir
      # (otherwise `~` translates differently between shells and the
      # cache doesn't actually round-trip). actions/cache covers the
      # cross-run persistence; CMAKE_<LANG>_COMPILER_LAUNCHER below
      # routes gcc/g++ through it. The cache restore key is a moving
      # target keyed on the commit SHA so each run writes a fresh entry,
      # while restore-keys lets us inherit the previous run's cache as
      # a warm starting point.
      - name: Restore ccache
        if: steps.reuse.outputs.reused != 'true'
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ccache
          key: ${{ runner.os }}-msys2-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-msys2-ccache-

      - name: Build with LLVM
        if: steps.reuse.outputs.reused != 'true'
        env:
          # Tag-pushed builds embed the tag name (so `tulpar --version`
          # shows e.g. `v1.0.0`); main-pushed builds get the rolling
          # auto-version. Same expression used by the create-release job
          # to keep `tulpar update --check` consistent with the embedded
          # version string.
          TULPAR_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.1.0.{0}', github.run_number) }}
          CCACHE_DIR: ${{ runner.temp }}/ccache
        run: |
          llvm-config --version
          mkdir -p build-windows
          cd build-windows
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DTULPAR_VERSION="${TULPAR_VERSION}"
          cmake --build . --config Release -j
        timeout-minutes: 20

      # Print ccache stats so a slow run is easy to triage at a glance —
      # the Build step above could be slow because nothing was cached
      # (cold start) or because the cache hit rate was poor (rare, but
      # would point at flag changes invalidating entries).
      - name: ccache stats
        if: steps.reuse.outputs.reused != 'true'
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache
        run: ccache -s

      - name: Prepare artifact
        if: steps.reuse.outputs.reused != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build-windows\tulpar.exe         dist\tulpar-windows-x64.exe
          Copy-Item build-windows\libtulpar_runtime.a dist\libtulpar_runtime-windows-x64.a
          # The MinGW runtime DLLs that the installer bundles are also
          # published as standalone release assets so the one-line
          # install.ps1 path (`iwr -useb tulparlang.dev/install.ps1 | iex`)
          # can fetch them too — without this, curl-installed users hit
          # STATUS_DLL_NOT_FOUND on first launch. We bundle:
          #   * libwinpthread-1.dll, zlib1.dll, libzstd.dll — MinGW + LLVM
          #     transitive deps (PR #52, PR #54)
          #   * libssl-3-x64.dll, libcrypto-3-x64.dll — OpenSSL 3 from
          #     mingw-w64-openssl, linked because CMakeLists.txt enables
          #     OpenSSL when present so `https://` URLs work in
          #     `tulpar update`, `tulpar pkg install`, and the embedded
          #     http_client. Discovered missing on a fresh Win10 box.
          # We assert each source DLL exists before copying so a future
          # MSYS2 rename (e.g. OpenSSL 4 -> libssl-4-x64.dll) fails the
          # build loudly instead of silently shipping an installer that
          # crashes at first launch on user machines.
          $mingwBin = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin"
          $bundledDlls = @(
            'libwinpthread-1.dll',
            'zlib1.dll',
            'libzstd.dll',
            'libssl-3-x64.dll',
            'libcrypto-3-x64.dll'
          )
          foreach ($dll in $bundledDlls) {
            $src = Join-Path $mingwBin $dll
            if (-not (Test-Path $src)) {
              throw "Bundled DLL missing in MSYS2: $src — has the package layout changed?"
            }
            Copy-Item $src "dist\$dll"
          }
          # Belt-and-suspenders: dump the actual import table of the built
          # tulpar.exe and fail the build if anything in the import list
          # isn't either a stock-Windows system DLL or one of the DLLs we
          # bundle. Catches the "binary picked up a new transitive
          # dependency we forgot to ship" failure mode at CI time, not
          # on user machines. System DLL list is the conservative set that
          # ships on every Windows 10+ box.
          $systemDlls = @(
            'kernel32.dll', 'kernelbase.dll', 'ntdll.dll', 'msvcrt.dll',
            'advapi32.dll', 'user32.dll', 'shell32.dll', 'ole32.dll',
            'oleaut32.dll', 'ws2_32.dll', 'crypt32.dll', 'secur32.dll',
            'gdi32.dll', 'rpcrt4.dll', 'shlwapi.dll', 'bcrypt.dll',
            'iphlpapi.dll', 'userenv.dll', 'version.dll', 'winmm.dll',
            'powrprof.dll', 'dbghelp.dll', 'imm32.dll'
          )
          $allowed = ($systemDlls + $bundledDlls) | ForEach-Object { $_.ToLower() }
          $imports = & objdump.exe -p dist\tulpar-windows-x64.exe |
                     Select-String '^\s*DLL Name:\s*(.+)$' |
                     ForEach-Object { $_.Matches[0].Groups[1].Value.Trim().ToLower() }
          $missing = $imports | Where-Object { $_ -notin $allowed }
          if ($missing) {
            Write-Host "tulpar.exe imports DLLs that are neither system nor bundled:" -ForegroundColor Red
            $missing | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
            Write-Host "Either add them to `$bundledDlls or to the system whitelist."
            throw "DLL bundling guard failed."
          }
          Write-Host "DLL bundling guard: OK ($($imports.Count) imports, all covered)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tulpar-windows-x64
          path: dist/tulpar-windows-x64.exe

      - name: Upload runtime library
        uses: actions/upload-artifact@v7
        with:
          name: libtulpar_runtime-windows-x64
          path: dist/libtulpar_runtime-windows-x64.a

      - name: Upload bundled MinGW DLLs
        uses: actions/upload-artifact@v7
        with:
          name: tulpar-windows-runtime-dlls
          path: |
            dist/libwinpthread-1.dll
            dist/zlib1.dll
            dist/libzstd.dll
            dist/libssl-3-x64.dll
            dist/libcrypto-3-x64.dll

      # ----------------------------------------------------------------
      # GUI installer (Inno Setup). Pre-installed on GitHub-hosted
      # `windows-latest` runners at C:\Program Files (x86)\Inno Setup 6\.
      # We run this in pwsh (not msys2) to avoid path-translation pain
      # when invoking the Windows-native ISCC.exe.
      # Skipped on the reuse path — the installer artifact has already
      # been downloaded from the PR's build run by the reuse step at
      # the top of this job.
      # ----------------------------------------------------------------
      - name: Build GUI installer (Inno Setup)
        if: steps.reuse.outputs.reused != 'true'
        shell: pwsh
        env:
          # Tag-pushed builds embed the tag name (so `tulpar --version`
          # shows e.g. `v1.0.0`); main-pushed builds get the rolling
          # auto-version. Same expression used by the create-release job
          # to keep `tulpar update --check` consistent with the embedded
          # version string.
          TULPAR_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.1.0.{0}', github.run_number) }}
        run: |
          # Inno Setup's AppVersion expects pure x.y.z[.w], no leading 'v'.
          $appVersion = $env:TULPAR_VERSION -replace '^v',''
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc — runner image changed?"
          }
          # The installer bundles libwinpthread / zlib1 / libzstd from
          # MSYS2 mingw64; setup-msys2 exposes its install root via the
          # `msys2-location` output. Joining `\mingw64\bin` gets us the
          # directory ISCC's Source: lines walk for the bundled DLLs.
          $mingwBin = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin"
          & $iscc `
            "/DAppVersion=$appVersion" `
            "/DSourceBinary=$pwd\build-windows\tulpar.exe" `
            "/DSourceRuntimeLib=$pwd\build-windows\libtulpar_runtime.a" `
            "/DSourceMingwBin=$mingwBin" `
            "installer\tulpar.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          # ISCC writes to installer\Output\<OutputBaseFilename>.exe
          Copy-Item installer\Output\tulpar-setup-windows-x64.exe dist\

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: tulpar-windows-installer
          path: dist/tulpar-setup-windows-x64.exe
  
  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    # Releases come from two paths: every push to main produces a
    # rolling `v2.1.0.<run>` release (used by `tulpar update` to roll
    # users forward continuously), and every `v*` tag push produces a
    # release named after the tag verbatim (used to mint stable
    # versions like v1.0.0 that we don't want overwriting on the next
    # main commit).
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' ||
       startsWith(github.ref, 'refs/tags/v'))
    # No `continue-on-error` — a release-publishing failure must turn the
    # workflow red. Silent failure here meant `tulpar update` would stop
    # seeing new versions while the build itself reported green.
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '{tulpar-*,libtulpar_runtime-*}'
          merge-multiple: true

      - name: Compute release tag
        id: ver
        shell: bash
        run: |
          # If the workflow was triggered by a tag push, use that tag
          # name verbatim — that's the explicit "stable v1.0.0" path.
          # Otherwise fall back to the rolling auto-version we mint on
          # every push to main.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v2.1.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using release tag: $TAG"

      # Generate a SHA-256 manifest covering every published release
      # asset. `tulpar update` and the install scripts both fetch this
      # file from `releases/download/<tag>/SHA256SUMS.txt` and verify
      # each downloaded artifact against it before installing — so a
      # transit-corrupted or maliciously-swapped binary fails the
      # verification step instead of being silently installed. Format
      # matches GNU coreutils `sha256sum -b` output (`<hex>  <name>`)
      # so a user can also verify manually with `sha256sum -c`.
      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          # Hash the actual files we're about to upload, not the
          # downloaded-artifacts directory layout (which may carry stale
          # entries from previous patterns). List explicitly so a missing
          # asset shows up as a CI failure here, not as a silent gap in
          # the manifest.
          ls -la
          : > SHA256SUMS.txt
          for f in \
              tulpar-linux-x64 \
              tulpar-macos-universal \
              tulpar-windows-x64.exe \
              tulpar-setup-windows-x64.exe \
              libtulpar_runtime-linux-x64.a \
              libtulpar_runtime-macos-universal.a \
              libtulpar_runtime-windows-x64.a \
              libwinpthread-1.dll \
              zlib1.dll \
              libzstd.dll \
              libssl-3-x64.dll \
              libcrypto-3-x64.dll; do
            if [ ! -f "$f" ]; then
              echo "ERROR: expected release artifact missing: $f" >&2
              exit 1
            fi
            sha256sum -b "$f" >> SHA256SUMS.txt
          done
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      # Detached GPG signature over SHA256SUMS.txt — a release-only ed25519
      # key whose public half is committed at `release-public.asc`. The
      # signature lets someone with the public key verify that the manifest
      # was produced by THIS workflow and hasn't been swapped post-release.
      # If GPG_PRIVATE_KEY isn't configured (e.g. on a fork), skip cleanly:
      # SHA256SUMS.txt itself still ships, and install scripts treat the
      # `.asc` as opt-in.
      - name: Sign SHA256SUMS.txt (GPG, opt-in via secret)
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG_PRIVATE_KEY secret not set; skipping signature (SHA256SUMS.txt still published)"
            exit 0
          fi
          # Import key into a workflow-scoped keyring; the runner is
          # ephemeral so cleanup after the job is automatic.
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import 2>&1 | tail -5
          # Detached + armored signature. `--pinentry-mode loopback` plus
          # an empty `--passphrase` lets gpg sign non-interactively when
          # the key was generated without a passphrase. If GPG_PASSPHRASE
          # is set, use it; otherwise pass an empty string.
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${GPG_PASSPHRASE:-}" \
              --detach-sign --armor \
              --output SHA256SUMS.txt.asc \
              SHA256SUMS.txt
          echo "--- SHA256SUMS.txt.asc ---"
          cat SHA256SUMS.txt.asc

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: TulparLang ${{ steps.ver.outputs.tag }} (LLVM)
          body: |
            ## TulparLang ${{ steps.ver.outputs.tag }}
            
            **LLVM-Based AOT Compiler**
            
            ### Features
            - Native compilation via LLVM backend
            - For loops, try/catch, file I/O, modules
            - Cross-platform support
            
            ### Downloads
            - `tulpar-setup-windows-x64.exe` - **Windows GUI installer** (recommended for Windows users; auto-PATH, Start Menu entry, Uninstall entry)
            - `tulpar-windows-x64.exe` - Windows raw executable (portable use)
            - `tulpar-linux-x64` - Linux executable
            - `tulpar-macos-universal` - macOS executable

            **Runtime libraries** (required for `tulpar build` / AOT, automatically installed by the one-line installer):
            - `libtulpar_runtime-linux-x64.a`
            - `libtulpar_runtime-macos-universal.a`
            - `libtulpar_runtime-windows-x64.a`

            **Windows runtime DLLs** (bundled by the GUI installer; published as standalone assets so `install.ps1` can fetch them too):
            - `libwinpthread-1.dll`, `zlib1.dll`, `libzstd.dll` — MinGW + LLVM transitive deps
            - `libssl-3-x64.dll`, `libcrypto-3-x64.dll` — OpenSSL 3 (required for HTTPS)

            **Integrity:**
            - `SHA256SUMS.txt` — `sha256sum -b` manifest covering every asset above. `tulpar update` verifies its downloads against this file; you can also check manually with `sha256sum -c SHA256SUMS.txt`.
            - `SHA256SUMS.txt.asc` — detached GPG signature over `SHA256SUMS.txt`, signed by the [TulparLang Release key](https://github.com/hamer1818/TulparLang/blob/main/release-public.asc) (fingerprint `CE5C 22BD EA61 58BC 8221 3A7E 4396 41B3 0E8D FDEE`). Optional verification: `gpg --verify SHA256SUMS.txt.asc SHA256SUMS.txt`. Present only when the workflow has the signing secret; absent on fork builds.

            ### One-line install (Windows / Linux / macOS)

            ```powershell
            # Windows (PowerShell)
            iwr -useb https://tulparlang.dev/install.ps1 | iex
            ```

            ```bash
            # Linux / macOS
            curl -fsSL https://tulparlang.dev/install.sh | bash
            ```

            > **Note**: Windows now has native support! No WSL required.
          draft: false
          prerelease: false
          files: |
            tulpar-linux-x64
            tulpar-macos-universal
            tulpar-windows-x64.exe
            tulpar-setup-windows-x64.exe
            libtulpar_runtime-linux-x64.a
            libtulpar_runtime-macos-universal.a
            libtulpar_runtime-windows-x64.a
            libwinpthread-1.dll
            zlib1.dll
            libzstd.dll
            libssl-3-x64.dll
            libcrypto-3-x64.dll
            SHA256SUMS.txt*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
