name: Benchmarks (auto-update README)

# Why this workflow exists: README's perf claims used to be hand-edited
# from one developer's local Windows runs, which made them slow to
# refresh and easy to drift from reality. This workflow regenerates the
# benchmark numbers in README.md and benchmarks/RESULTS.md after every
# successful main build, then commits the refreshed files back.
# Methodology + variance notes live in benchmarks/CI.md.

on:
  # Fire after the build workflow finishes on main. We consume its
  # already-built `tulpar-linux-x64` artifact instead of compiling
  # Tulpar from scratch — saves the 5-10 min of LLVM 18 compile per
  # bench run, and guarantees we benchmark the same binary that built
  # successfully.
  workflow_run:
    workflows: ["Linux & macOS Build (LLVM)"]
    types: [completed]
    branches: [main]
  # Manual re-run for debugging / one-off refreshes. Pulls the latest
  # successful build run's artifact from `main` rather than rebuilding.
  workflow_dispatch:

# `contents: write` lets the bench-bot push to its own branch.
# `actions: read` is required so the cross-workflow artifact download
# can list the triggering build run's artifacts. `pull-requests:
# write` lets the bot open a PR (and enable auto-merge on it) — direct
# push to `main` is blocked by branch protection, so we route the
# refresh through a PR like every other change.
permissions:
  contents: write
  actions: read
  pull-requests: write

# Don't run two benchmark jobs concurrently on the same ref — they'd
# share runner CPU and produce meaningless cross-contaminated numbers.
# We don't cancel in progress because each commit's numbers are
# themselves the artifact we want recorded.
concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Skip when:
    #   * the triggering build failed (no artifact to consume anyway);
    #   * the triggering commit IS the bench-bot's own refresh.
    #
    # We recognise the bot's refresh by the commit subject's exact
    # prefix — earlier we used `contains(message, '[bench skip]')` but
    # that false-positived on any human PR whose description happened
    # to mention `[bench skip]` in passing (caught the long way: PR
    # 111's body explained the marker and accidentally suppressed the
    # bench that should have run on its merge). The bot writes a very
    # specific subject line, so prefix-matching against that is robust.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !startsWith(github.event.workflow_run.head_commit.message, 'ci(benchmarks): refresh results from CI run [bench skip]'))
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # On workflow_run, the default ref is the branch the workflow
          # FILE lives on (main), but the build we're benchmarking may
          # have run against a now-superseded commit. Pin to that exact
          # commit so the README we publish matches the binary that
          # produced the numbers.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Tulpar binary acquisition. Two paths:
      #   1. workflow_run    -> pull the artifact from THIS run.
      #   2. workflow_dispatch -> find the most recent successful build
      #      run on main and pull from there. Falls back to a from-source
      #      build if no successful run exists yet (first-time / clean
      #      slate scenarios).
      # ------------------------------------------------------------------
      - name: Download Tulpar binary (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: tulpar-linux-x64
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Tulpar runtime lib (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: libtulpar_runtime-linux-x64
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Acquire Tulpar binary (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p dist
          # Prefer reusing the latest successful build artifact so the
          # manual run reflects the same binary as the auto-triggered
          # path. Falls back to source build if the workflow has never
          # run successfully on main (greenfield / brand-new repo).
          run_id=$(gh run list \
            --workflow='Linux & macOS Build (LLVM)' \
            --branch=main --status=success --limit=1 \
            --json databaseId --jq '.[0].databaseId' || echo "")
          if [ -n "$run_id" ]; then
            echo "Reusing Tulpar artifact from build run $run_id"
            gh run download "$run_id" \
              -n tulpar-linux-x64           -D dist \
              -n libtulpar_runtime-linux-x64 -D dist
          else
            echo "No successful main build found; building from source."
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential cmake llvm-18-dev
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            cmake --build . -j"$(nproc)"
            cp tulpar                ../dist/tulpar-linux-x64
            cp libtulpar_runtime.a   ../dist/libtulpar_runtime-linux-x64.a
          fi

      - name: Stage Tulpar binary + runtime lib
        run: |
          set -e
          # Move both files to the repo root with their canonical names.
          # The AOT pipeline's `build_link_search_dirs()` probes the
          # directory containing the running tulpar binary first, so
          # placing libtulpar_runtime.a next to ./tulpar is enough for
          # `tulpar build` to find it during the http_bench wings_*
          # compiles.
          mv dist/tulpar-linux-x64                ./tulpar
          mv dist/libtulpar_runtime-linux-x64.a   ./libtulpar_runtime.a
          chmod +x ./tulpar
          ls -la ./tulpar ./libtulpar_runtime.a
          ./tulpar --help | head -3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # `ubuntu-latest` ships rustc + cargo via rustup and gcc out of
      # the box, so no explicit Rust / C setup step is needed.

      # Run the suite. `--no-java` because JVM startup dominates the
      # short loopsum/fib timings and varies wildly on shared CI
      # runners; we'd be measuring runner noise more than the workload.
      # See benchmarks/CI.md for the variance discussion.
      - name: Run benchmarks
        env:
          TULPAR_HTTP_QUIET: '1'
        run: |
          python3 benchmarks/ci_run.py \
            --repeats 5 \
            --http-requests 3000 \
            --http-connections 4 \
            --no-java
        timeout-minutes: 15

      - name: Update README perf tables from RESULTS.json
        run: python3 benchmarks/update_readme.py

      - name: Show diff
        run: |
          echo "=== git status ==="
          git status --short
          echo "=== diff ==="
          git --no-pager diff README.md benchmarks/RESULTS.md benchmarks/RESULTS.json || true

      - name: Open or refresh bench PR
        env:
          # AUTOMERGE_PAT is the same fine-grained user PAT that
          # auto-merge.yml uses (Contents + Pull requests, read+write
          # on this repo). We need it for two reasons:
          #   1. The default GITHUB_TOKEN cannot create pull requests
          #      unless the repo's Settings → Actions → Workflow
          #      permissions → "Allow GitHub Actions to create and
          #      approve pull requests" is enabled. We don't want to
          #      flip that — using a PAT keeps the setting locked
          #      down for any other workflow that might be tempted.
          #   2. PRs / merges done via GITHUB_TOKEN suppress
          #      downstream `push` workflows (GitHub's recursion
          #      guard). Our auto-merge step needs main's build.yml
          #      to fire on the squashed commit (so create-release
          #      keeps publishing rolling releases), and that only
          #      happens with a user-scoped PAT — same reason
          #      auto-merge.yml uses this exact secret.
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -e
          # Git identity for the bot commit. Keep these fields stable so
          # `git log --author='tulpar-bench-bot'` works as a filter.
          git config user.name 'tulpar-bench-bot'
          git config user.email 'bench@tulparlang.dev'

          # If nothing changed (rare — only if the runner produced
          # numbers identical to the prior run, or the markers in
          # README/RESULTS were missing) we exit clean. The workflow is
          # still green; we just have no commit to make.
          if git diff --quiet README.md benchmarks/RESULTS.md benchmarks/RESULTS.json 2>/dev/null; then
            echo "No benchmark changes — nothing to commit."
            exit 0
          fi

          # Direct push to `main` is blocked by branch protection on
          # this repo (3 required status checks). Instead we land the
          # refresh through a PR on a stable branch, with auto-merge
          # enabled — same machinery any other change goes through.
          BRANCH="bench/auto-refresh"
          # `-B` (re)creates the branch on top of the current detached
          # HEAD (which is the SHA we benchmarked). Each refresh
          # entirely replaces the branch — we don't accumulate history
          # because every refresh fully overwrites README/RESULTS from
          # the same JSON shape.
          git checkout -B "$BRANCH"
          git add README.md benchmarks/RESULTS.md benchmarks/RESULTS.json
          # Multiple -m flags instead of one multiline string — keeps
          # the YAML block scalar indentation rules from caring about
          # the message body's leading whitespace.
          git commit \
            -m "ci(benchmarks): refresh results from CI run [bench skip]" \
            -m "Source commit: ${GH_SHA}" \
            -m "Workflow run: https://github.com/${GH_REPO}/actions/runs/${GH_RUN_ID}" \
            -m "Auto-generated by .github/workflows/bench.yml. Orchestrator: benchmarks/ci_run.py. Methodology + variance notes: benchmarks/CI.md."

          # Plain `--force` (not `--force-with-lease`) is intentional.
          # The checkout step uses `fetch-depth: 1`, so we don't have
          # `refs/remotes/origin/$BRANCH` locally. Without that
          # remote-tracking ref, `--force-with-lease` (no explicit
          # lease value) refuses the push whenever the remote branch
          # already exists — which it does any time the previous
          # refresh's PR hasn't merged yet (or left an orphan branch
          # behind, as happened between PR #112 and #113). The bench
          # branch is bot-owned and exists only to be overwritten by
          # the next CI run, so the lease semantic isn't useful here.
          git push --force origin "HEAD:$BRANCH"

          # Open a PR if none is already open for this branch. If one
          # exists, the push above already updated its commits — gh
          # will pick up the new state automatically once the PR
          # branch's checks rerun.
          existing=$(gh pr list --head "$BRANCH" --state open \
                       --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH — push refreshed it."
          else
            # The PR title carries [bench skip]. When auto-merge
            # squashes this PR, the squash commit on `main` carries
            # the same title, which the workflow_run trigger filter
            # at the top of this file recognises and skips — that's
            # how we avoid an infinite refresh loop.
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "ci(benchmarks): refresh results from CI run [bench skip]" \
              --body "$(printf 'Auto-generated by [.github/workflows/bench.yml](.github/workflows/bench.yml). Refreshes README.md, benchmarks/RESULTS.md, and benchmarks/RESULTS.json from the CI runner.\n\n- Source commit: %s\n- Workflow run: https://github.com/%s/actions/runs/%s\n\nMethodology + variance notes: [benchmarks/CI.md](benchmarks/CI.md).' "$GH_SHA" "$GH_REPO" "$GH_RUN_ID")"

            # Auto-enable squash-merge. When the required status
            # checks pass on this branch, the PR squashes itself and
            # the bench branch is deleted. If auto-merge is disabled
            # at the repo level this fails non-fatally — the PR is
            # still open and a human can merge it manually.
            gh pr merge --auto --squash --delete-branch "$BRANCH" || \
              echo "WARN: auto-merge enable failed — PR open, needs manual merge."
          fi
